services:
  dermascan:
    build: .
    container_name: dermascan
    restart: unless-stopped
    ports:
      - "3333:5000"
    volumes:
      - ./models:/app/models
      - ./database:/app/database
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - SKIP_DATASET_DOWNLOAD=true
      - SECRET_KEY=${SECRET_KEY:-dermascan-prod-2026}
